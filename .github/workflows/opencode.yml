name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334

    steps:
      # ── Stage 1: Trigger and setup ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout PR branch
        if: github.event.issue.pull_request || github.event.pull_request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number || github.event.pull_request.number }}
          gh pr checkout "$PR_NUMBER"
          echo ".opencode/" >> .gitignore
          echo "opencode.json" >> .gitignore

      - name: Bot Details
        id: bot-details
        uses: raven-actions/bot-details@v1

      - name: Setup credentials
        run: |
          git config --global user.name "${{ steps.bot-details.outputs.name }}"
          git config --global user.email "${{ steps.bot-details.outputs.email }}"
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf https://github.com/

      - name: Acknowledge request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "🤖 Hi @${{ github.actor }}, I've received your review request and I'm working on it! You can track progress [in the logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})." \
            --repo "${{ github.repository }}"

      # ── Stage 2: Static Analysis ──────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Run static analysis
        run: bash .github/scripts/static-analysis.sh
        continue-on-error: true

      - name: Ensure analysis artifact exists
        run: |
          mkdir -p .opencode
          if [ ! -f .opencode/analysis.txt ]; then
            echo "# Static analysis summary" > .opencode/analysis.txt
            echo "" >> .opencode/analysis.txt
            echo "Static analysis was not available for this review." >> .opencode/analysis.txt
            echo "The reviewer should perform manual code inspection." >> .opencode/analysis.txt
          fi

      # ── Stage 3: Semantic Indexing + MCP ──────────────────────────────────
      - name: Install MCP server
        id: mcp-install
        env:
          CXXFLAGS: "-std=c++20"
        run: |
          npm install -g @iflow-mcp/qdrant-mcp-server --legacy-peer-deps --quiet
          MCP_BIN=$(which qdrant-mcp-server)
          echo "mcp_path=$MCP_BIN" >> "$GITHUB_OUTPUT"
          echo "mcp_available=true" >> "$GITHUB_OUTPUT"
          echo "Installed MCP server at $MCP_BIN"
        continue-on-error: true

      - name: Verify Qdrant connectivity
        run: |
          echo "Waiting for Qdrant to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:6333/readyz > /dev/null 2>&1; then
              echo "Qdrant is ready!"
              exit 0
            fi
            sleep 1
          done
          echo "::warning::Qdrant did not become ready in time"
          exit 1
        continue-on-error: true

      # ── Stage 4: OpenCode Configuration ───────────────────────────────────
      - name: Create opencode.json
        env:
          MCP_PATH: ${{ steps.mcp-install.outputs.mcp_path }}
          MCP_AVAILABLE: ${{ steps.mcp-install.outcome == 'success' }}
        run: |
          python3 << 'PYEOF'
          import json, os

          mcp_path = os.environ.get("MCP_PATH", "")
          mcp_available = os.environ.get("MCP_AVAILABLE", "false") == "true"

          config = {
              "$schema": "https://opencode.ai/config.json",
              "provider": {
                  "lightbridge": {
                      "npm": "@ai-sdk/openai-compatible",
                      "name": "LightBridge Server",
                      "options": {
                          "baseURL": "{env:LIGHTBRIDGE_BASE_URL}",
                          "headers": {
                              "Authorization": "Bearer {env:LIGHTBRIDGE_API_KEY}"
                          }
                      },
                      "models": {
                          "gemini-3-flash": {"name": "Gemini 3 Flash"},
                          "glm-5": {"name": "GLM-5"}
                      }
                  }
              },
              "mode": {
                  "review": {
                      "prompt": "{file:.opencode/review-rules.md}",
                      "tools": {
                          "write": False,
                          "edit": False,
                          "bash": True,
                          "read": True,
                          "grep": True,
                          "glob": True
                      }
                  }
              }
          }

          if mcp_available and mcp_path:
              config["mcp"] = {
                  "code_search": {
                      "type": "local",
                      "command": ["node", mcp_path],
                      "enabled": True,
                      "environment": {
                          "QDRANT_URL": "http://localhost:6333",
                          "EMBEDDING_PROVIDER": "openai",
                          "OPENAI_API_KEY": "{env:LIGHTBRIDGE_API_KEY}",
                          "EMBEDDING_BASE_URL": "{env:LIGHTBRIDGE_BASE_URL}",
                          "EMBEDDING_MODEL": "text-embedding-3-small",
                          "CODE_ENABLE_AST": "true",
                          "CODE_CHUNK_SIZE": "2500"
                      }
                  }
              }
              print("MCP server configured at:", mcp_path)
          else:
              print("::warning::MCP server not available, OpenCode will run without semantic search")

          with open("opencode.json", "w") as f:
              json.dump(config, f, indent=2)

          print("opencode.json written successfully")
          PYEOF

          echo "::group::opencode.json"
          cat opencode.json
          echo "::endgroup::"

      # ── Stage 5: OpenCode Execution ───────────────────────────────────────
      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          LIGHTBRIDGE_API_KEY: ${{ secrets.LIGHTBRIDGE_API_KEY }}
          LIGHTBRIDGE_BASE_URL: ${{ vars.LIGHTBRIDGE_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: lightbridge/glm-5
          use_github_token: true
          prompt: |
            You are reviewing a pull request. Follow these steps carefully:

            1. Read `.opencode/analysis.txt` to understand what static analysis found.
            2. Read `.opencode/review-rules.md` to understand the repository review conventions.
            3. Read `AGENTS.md` to understand the project architecture and coding standards.
            4. If the `code_search` MCP is available:
               a. Call `index_codebase` with path "." to index the repository.
               b. Use `search_code` to explore related code, patterns, and conventions
                  beyond what is visible in the diff.
            5. Focus your review on:
               - Correctness, security, and regressions
               - Architecture consistency with existing patterns
               - Missing tests or error handling
               - Issues that static analysis flagged as high severity
            6. Do NOT simply restate linter findings. Add value by connecting findings
               to broader context.
            7. Prioritize substantive comments over stylistic nitpicks.
            8. If static analysis or MCP was unavailable, note this briefly and
               proceed with manual review based on the diff.

      # ── Failure handler ───────────────────────────────────────────────────
      - name: Report failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "🤖 I'm sorry @${{ github.actor }}, but the review pipeline encountered an error. Please [see the logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." \
            --repo "${{ github.repository }}"